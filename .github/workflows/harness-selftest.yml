name: harness-selftest

# The enforcement harness's entire value is that it can't be silently bypassed.
# A regression in a hook or tool is invisible without this, so run the bundled
# regression guard (bash + git only) on every PR and on pushes to main.
# (push is filtered to main so a same-repo PR branch doesn't run everything twice.)
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  selftest:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # run-all.sh covers syntax (bash -n), shellcheck -S error (present on the
      # runner), the runtime selftest, static consistency, and the e2e smoke
      # test. -S error only: the hooks intentionally use unquoted word splitting
      # (e.g. $HARNESS_FROZEN), so warning-level lint would be noise.
      - name: Run all harness tests
        run: bash template/test/run-all.sh

  # The Windows story (CRLF handling, path translation, the PowerShell entry
  # points) only breaks on a real Windows checkout — a Linux pwsh run cannot
  # see it. run-all.ps1 locates Git Bash and runs the full Bash surface
  # through it, so this exercises exactly what a Windows operator would run.
  selftest-windows:
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run all harness tests via the PowerShell entry point
        shell: pwsh
        run: |
          & "$env:GITHUB_WORKSPACE\template\test\run-all.ps1"
          exit $LASTEXITCODE

  # Deliberately weaken enforcement in disposable copies and require the named
  # regression assertion to fail. This is a distribution-maintainer sensor,
  # not a test installed into consumer repositories.
  mutation:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Prove enforcement tests have teeth
        run: bash test/mutation-test.sh
